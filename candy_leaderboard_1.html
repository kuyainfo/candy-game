<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點心屋派對｜後台排行榜</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #0d0520;
  font-family: 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif;
  overflow: hidden;
}
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #1a0538 0%, #0d0520 60%, #020d1a 100%);
}
.bg-star {
  position: absolute; border-radius: 50%; background: #fff;
  animation: twinkle linear infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.03} 50%{opacity:0.4} }

/* ── 版面 ── */
#app {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: row;
  padding: 0;
  gap: 0;
}
/* 左欄：排行榜 */
#left-col {
  flex: 1;
  display: flex; flex-direction: column;
  padding: 28px 32px 20px 48px;
  min-width: 0;
}
/* 右欄：煊秦 */
#right-col {
  width: 300px; flex-shrink: 0;
  background: rgba(255,255,255,0.04);
  border-right: 1px solid rgba(255,133,200,0.15);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  gap: 16px; padding: 24px 16px;
}

/* ── 標題列 ── */
#header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-logo { font-size: 42px; }
.header-titles {}
.header-title {
  font-size: 32px; font-weight: 900; color: #fff;
  text-shadow: 0 0 24px #ff85c8, 0 0 48px #ff85c8;
  letter-spacing: 3px; line-height: 1;
}
.header-sub { font-size: 13px; color: rgba(255,200,240,0.5); letter-spacing: 4px; margin-top: 4px; }
.header-right { text-align: right; }
.live-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; background: #0be881;
  box-shadow: 0 0 10px #0be881;
  animation: blink 1.2s ease infinite; margin-right: 6px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-label { font-size: 13px; color: #0be881; letter-spacing: 2px; }
.player-count { font-size: 28px; font-weight: 900; color: #ffd32a; margin-top: 4px; }
.player-count-label { font-size: 11px; color: rgba(255,211,42,0.5); letter-spacing: 2px; }

/* ── 排行榜 ── */
#board-wrap { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
#board-wrap::-webkit-scrollbar { width: 4px; }
#board-wrap::-webkit-scrollbar-track { background: transparent; }
#board-wrap::-webkit-scrollbar-thumb { background: rgba(255,133,200,0.3); border-radius: 4px; }

.rank-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,255,255,0.07);
  transition: all 0.5s cubic-bezier(.2,.8,.4,1.2);
  animation: rowIn 0.5s cubic-bezier(.2,.8,.4,1.2) both;
  flex-shrink: 0;
}
@keyframes rowIn {
  from { transform: translateX(-30px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.rank-row.rank-1 {
  background: linear-gradient(135deg, rgba(255,211,42,0.15), rgba(255,133,200,0.08));
  border-color: rgba(255,211,42,0.4);
  box-shadow: 0 0 24px rgba(255,211,42,0.15);
}
.rank-row.rank-2 {
  background: linear-gradient(135deg, rgba(192,192,192,0.12), rgba(162,155,254,0.06));
  border-color: rgba(192,192,192,0.3);
}
.rank-row.rank-3 {
  background: linear-gradient(135deg, rgba(200,98,42,0.12), rgba(255,107,107,0.06));
  border-color: rgba(200,98,42,0.3);
}
.rank-row.updated {
  animation: flashUpdate 0.6s ease;
}
@keyframes flashUpdate {
  0%   { background: rgba(11,232,129,0.25); border-color: #0be881; }
  100% { }
}

.rank-num {
  font-size: 22px; font-weight: 900; min-width: 44px; text-align: center;
  color: rgba(255,255,255,0.3);
}
.rank-row.rank-1 .rank-num { color: #ffd32a; font-size: 28px; }
.rank-row.rank-2 .rank-num { color: #c0c0c0; font-size: 24px; }
.rank-row.rank-3 .rank-num { color: #c8622a; font-size: 24px; }

.rank-medal { font-size: 28px; min-width: 36px; text-align: center; }

.rank-name {
  flex: 1; font-size: 22px; font-weight: 900; color: #fff;
  letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rank-row.rank-1 .rank-name { color: #ffd32a; font-size: 26px; }

.rank-score {
  font-size: 28px; font-weight: 900; color: #ffd32a;
  text-shadow: 0 0 12px rgba(255,211,42,0.5);
  min-width: 120px; text-align: right;
}
.rank-row.rank-1 .rank-score { font-size: 36px; }
.rank-score-label {
  font-size: 10px; color: rgba(255,211,42,0.4);
  letter-spacing: 2px; display: block; text-align: right; margin-top: 2px;
}

.rank-house { font-size: 20px; min-width: 28px; text-align: center; }

/* ── 空狀態 ── */
#empty-state {
  display: none; flex: 1; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#empty-state.show { display: flex; }
.empty-icon { font-size: 64px; opacity: 0.3; animation: bounce 2s ease-in-out infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.empty-text { font-size: 18px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

/* ── 底部 ── */
#footer {
  flex-shrink: 0; text-align: center; margin-top: 20px;
  font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 2px;
}

/* ── 清除按鈕 ── */
#clear-btn {
  margin-top: 10px;
  padding: 8px 18px;
  border-radius: 50px;
  border: 1.5px solid rgba(255,107,107,0.5);
  background: rgba(255,107,107,0.1);
  color: #ff6b6b;
  font-size: 12px;
  font-family: inherit;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
#clear-btn:hover {
  background: rgba(255,107,107,0.25);
  border-color: #ff6b6b;
  box-shadow: 0 0 12px rgba(255,107,107,0.3);
}


/* ── 右欄：煊秦 ── */
.xq-photo {
  width: 200px; height: 200px;
  border-radius: 50%;
  object-fit: cover; object-position: center top;
  border: 4px solid #ff85c8;
  box-shadow: 0 0 32px rgba(255,133,200,0.5);
  transition: opacity 0.4s ease;
}
.xq-label {
  font-size: 13px; color: rgba(255,200,240,0.6);
  letter-spacing: 3px; text-align: center;
}
.xq-quote {
  font-size: 18px; font-weight: 900; color: #fff;
  text-align: center; line-height: 1.5;
  text-shadow: 0 0 12px rgba(255,133,200,0.6);
  padding: 0 8px;
}
.xq-top-house {
  font-size: 40px; text-align: center;
  filter: drop-shadow(0 0 8px rgba(255,211,42,0.5));
}
.xq-top-score {
  font-size: 36px; font-weight: 900; color: #ffd32a;
  text-shadow: 0 0 16px rgba(255,211,42,0.6);
  text-align: center;
}
.xq-top-name {
  font-size: 14px; color: rgba(255,211,42,0.6);
  letter-spacing: 2px; text-align: center;
}
.xq-divider {
  width: 60%; height: 1px;
  background: linear-gradient(to right, transparent, rgba(255,133,200,0.3), transparent);
}

/* ── 全屏提示：一般新分數 ── */
#flash-overlay {
  position: fixed; inset: 0; z-index: 500;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: rgba(10,2,30,0.88);
  opacity: 0; pointer-events: none;
  transition: opacity 0.3s ease;
}
#flash-overlay.show { opacity: 1; }
.flash-label {
  font-size: 20px; color: rgba(255,200,240,0.7);
  letter-spacing: 4px; margin-bottom: 12px;
}
.flash-name {
  font-size: 52px; font-weight: 900; color: #fff;
  text-shadow: 0 0 32px #ff85c8;
  letter-spacing: 2px;
}
.flash-score {
  font-size: 80px; font-weight: 900; color: #ffd32a;
  text-shadow: 0 0 40px rgba(255,211,42,0.7);
  line-height: 1;
}
.flash-pts {
  font-size: 20px; color: rgba(255,211,42,0.5);
  letter-spacing: 4px;
}
.flash-house { font-size: 48px; margin-top: 8px; }

/* ── 全屏提示：新第一名 ── */
#no1-overlay {
  position: fixed; inset: 0; z-index: 510;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  background: radial-gradient(ellipse at center, rgba(255,211,42,0.25) 0%, rgba(10,2,30,0.92) 70%);
  opacity: 0; pointer-events: none;
  transition: opacity 0.4s ease;
}
#no1-overlay.show { opacity: 1; }
.no1-crown { font-size: 72px; animation: crownBounce 0.6s ease infinite alternate; }
@keyframes crownBounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
.no1-label {
  font-size: 22px; color: #ffd32a;
  letter-spacing: 6px; margin: 8px 0 4px;
  text-shadow: 0 0 20px rgba(255,211,42,0.8);
}
.no1-name {
  font-size: 56px; font-weight: 900; color: #fff;
  text-shadow: 0 0 40px #ffd32a, 0 0 80px #ff85c8;
}
.no1-score {
  font-size: 88px; font-weight: 900; color: #ffd32a;
  text-shadow: 0 0 48px rgba(255,211,42,0.8);
  line-height: 1;
}
.no1-pts { font-size: 22px; color: rgba(255,211,42,0.6); letter-spacing: 4px; }
.no1-particle {
  position: absolute; font-size: 24px;
  animation: no1Fly 1.8s ease forwards;
  opacity: 0;
}
@keyframes no1Fly {
  0%  { opacity:0; transform:translate(0,0) scale(0.5); }
  20% { opacity:1; }
  100%{ opacity:0; transform:translate(var(--tx),var(--ty)) scale(1.3) rotate(var(--rot)); }
}

</style>
</head>

<div id="bg"></div>

<div id="flash-overlay" id="flash-overlay">
  <div class="flash-label">🍬 新分數進來了！</div>
  <div class="flash-name" id="flash-name"></div>
  <div class="flash-score" id="flash-score"></div>
  <div class="flash-pts">PTS</div>
  <div class="flash-house" id="flash-house"></div>
</div>

<div id="no1-overlay">
  <div class="no1-crown">👑</div>
  <div class="no1-label">✨ 新的第一名！✨</div>
  <div class="no1-name" id="no1-name"></div>
  <div class="no1-score" id="no1-score"></div>
  <div class="no1-pts">PTS</div>
</div>

let prevNo1Name = '';

function showFlash(name, score, isNewNo1){
  const EMOJIS = ['🍬','⭐','💖','🍭','✨','🎉','🌈'];
  if(isNewNo1){
    const ov = document.getElementById('no1-overlay');
    document.getElementById('no1-name').textContent = name;
    document.getElementById('no1-score').textContent = score.toLocaleString();
    for(let i=0;i<18;i++){
      const el=document.createElement('div'); el.className='no1-particle';
      el.textContent=EMOJIS[i%EMOJIS.length];
      const tx=(Math.random()-0.5)*window.innerWidth*0.9;
      const ty=(Math.random()-0.5)*window.innerHeight*0.9;
      el.style.cssText='left:50%;top:50%;--tx:'+tx+'px;--ty:'+ty+'px;--rot:'+(Math.random()*360)+'deg;animation-delay:'+(i*0.06)+'s';
      ov.appendChild(el);
      setTimeout(()=>el.remove(),2000);
    }
    ov.classList.add('show');
    setTimeout(()=>ov.classList.remove('show'), 2800);
  } else {
    const ov = document.getElementById('flash-overlay');
    document.getElementById('flash-name').textContent = name;
    document.getElementById('flash-score').textContent = score.toLocaleString();
    document.getElementById('flash-house').textContent = getHouseEmoji(score);
    ov.classList.add('show');
    setTimeout(()=>ov.classList.remove('show'), 1600);
  }
}

function updateXQ(sorted){
  const photo    = document.getElementById('xq-photo');
  const quote    = document.getElementById('xq-quote');
  const topHouse = document.getElementById('xq-top-house');
  const topScore = document.getElementById('xq-top-score');
  const topName  = document.getElementById('xq-top-name');
  if(!sorted.length){
    photo.src=XQ_HAPPY; quote.textContent='快來幫我找糖果！🍬';
    topScore.textContent='—'; topName.textContent='等待玩家...'; topHouse.textContent='🏠';
    return;
  }
  const best = sorted[0].score;
  if(best<3000){ photo.src=XQ_SAD; quote.textContent='哼，煊秦不滿意'; }
  else if(best<5000){ photo.src=XQ_OK; quote.textContent='不錯不錯，煊秦給你一顆糖🍬'; }
  else { photo.src=XQ_HAPPY; quote.textContent='天哪，你是煊秦的糖果英雄！🎉'; }
  topHouse.textContent=getHouseEmoji(best);
  topScore.textContent=best.toLocaleString();
  topName.textContent=sorted[0].name;
}

let prevScores = {}; // 追蹤前一次的分數，用來偵測更新

function render(scores){
  const sorted = Object.values(scores).sort((a,b)=>b.score-a.score);
  playerCount.textContent = sorted.length;

  if(sorted.length===0){
    emptyState.classList.add('show');
    boardWrap.querySelectorAll('.rank-row').forEach(el=>el.remove());
    return;
  }
  emptyState.classList.remove('show');

  const display = sorted;

  boardWrap.querySelectorAll('.rank-row').forEach(el=>el.remove());

  display.forEach((p,i)=>{
    const row = document.createElement('div');
    const rankClass = i<3 ? `rank-${i+1}` : '';
    const wasUpdated = prevScores[p.name] !== undefined && prevScores[p.name] !== p.score;
    row.className = `rank-row ${rankClass}`;
    row.style.animationDelay = (i*0.05)+'s';
    row.innerHTML = `
      <div class="rank-num">${i+1}</div>
      <div class="rank-medal">${i<3 ? MEDALS[i] : ''}</div>
      <div class="rank-name">${p.name}</div>
      <div class="rank-house">${getHouseEmoji(p.score)}</div>
      <div>
        <div class="rank-score">${p.score.toLocaleString()}</div>
        <span class="rank-score-label">PTS</span>
      </div>
    `;
    if(wasUpdated) setTimeout(()=>row.classList.add('updated'), 100);
    boardWrap.appendChild(row);
  });

  // 全屏提示
  sorted.forEach((p)=>{
    const isNew     = prevScores[p.name] === undefined;
    const isUpdated = prevScores[p.name] !== undefined && prevScores[p.name] !== p.score;
    if(isNew || isUpdated){
      const isNo1 = sorted.length && sorted[0].name === p.name && p.name !== prevNo1Name;
      showFlash(p.name, p.score, isNo1);
    }
  });
  updateXQ(sorted);
  if(sorted.length) prevNo1Name = sorted[0].name;

  // 更新舊分數紀錄
  prevScores = {};
  sorted.forEach(p=>{ prevScores[p.name]=p.score; });
}

// 即時監聽 Firebase
const scoresRef = ref(db, 'scores');
onValue(scoresRef, (snap)=>{
  if(snap.exists()) render(snap.val());
  else render({});
});

// 清除所有資料
import { remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
document.getElementById('clear-btn').addEventListener('click', async ()=>{
  if(!confirm('確定要清除所有玩家分數嗎？\n此動作無法復原。')) return;
  if(!confirm('再次確認：清除後排行榜將歸零，繼續嗎？')) return;
  await remove(ref(db, 'scores'));
  alert('✅ 已清除所有資料！');
});

</script>
</body>
