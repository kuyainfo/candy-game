<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>點心屋派對｜後台排行榜</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; background: #0d0520;
  font-family: 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif;
  overflow: hidden;
}
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(135deg, #1a0538 0%, #0d0520 60%, #020d1a 100%);
}
.bg-star {
  position: absolute; border-radius: 50%; background: #fff;
  animation: twinkle linear infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.03} 50%{opacity:0.4} }

/* ── 版面 ── */
#app {
  position: relative; z-index: 1;
  width: 100vw; height: 100vh;
  display: flex; flex-direction: column;
  padding: 32px 48px 28px;
}

/* ── 標題列 ── */
#header {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 28px; flex-shrink: 0;
}
.header-left { display: flex; align-items: center; gap: 16px; }
.header-logo { font-size: 42px; }
.header-titles {}
.header-title {
  font-size: 32px; font-weight: 900; color: #fff;
  text-shadow: 0 0 24px #ff85c8, 0 0 48px #ff85c8;
  letter-spacing: 3px; line-height: 1;
}
.header-sub { font-size: 13px; color: rgba(255,200,240,0.5); letter-spacing: 4px; margin-top: 4px; }
.header-right { text-align: right; }
.live-dot {
  display: inline-block; width: 10px; height: 10px;
  border-radius: 50%; background: #0be881;
  box-shadow: 0 0 10px #0be881;
  animation: blink 1.2s ease infinite; margin-right: 6px;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
.live-label { font-size: 13px; color: #0be881; letter-spacing: 2px; }
.player-count { font-size: 28px; font-weight: 900; color: #ffd32a; margin-top: 4px; }
.player-count-label { font-size: 11px; color: rgba(255,211,42,0.5); letter-spacing: 2px; }

/* ── 排行榜 ── */
#board-wrap { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 10px; padding-right: 4px; }
#board-wrap::-webkit-scrollbar { width: 4px; }
#board-wrap::-webkit-scrollbar-track { background: transparent; }
#board-wrap::-webkit-scrollbar-thumb { background: rgba(255,133,200,0.3); border-radius: 4px; }

.rank-row {
  display: flex; align-items: center; gap: 16px;
  padding: 14px 24px;
  border-radius: 16px;
  background: rgba(255,255,255,0.04);
  border: 1.5px solid rgba(255,255,255,0.07);
  transition: all 0.5s cubic-bezier(.2,.8,.4,1.2);
  animation: rowIn 0.5s cubic-bezier(.2,.8,.4,1.2) both;
  flex-shrink: 0;
}
@keyframes rowIn {
  from { transform: translateX(-30px); opacity: 0; }
  to   { transform: translateX(0); opacity: 1; }
}
.rank-row.rank-1 {
  background: linear-gradient(135deg, rgba(255,211,42,0.15), rgba(255,133,200,0.08));
  border-color: rgba(255,211,42,0.4);
  box-shadow: 0 0 24px rgba(255,211,42,0.15);
}
.rank-row.rank-2 {
  background: linear-gradient(135deg, rgba(192,192,192,0.12), rgba(162,155,254,0.06));
  border-color: rgba(192,192,192,0.3);
}
.rank-row.rank-3 {
  background: linear-gradient(135deg, rgba(200,98,42,0.12), rgba(255,107,107,0.06));
  border-color: rgba(200,98,42,0.3);
}
.rank-row.updated {
  animation: flashUpdate 0.6s ease;
}
@keyframes flashUpdate {
  0%   { background: rgba(11,232,129,0.25); border-color: #0be881; }
  100% { }
}

.rank-num {
  font-size: 22px; font-weight: 900; min-width: 44px; text-align: center;
  color: rgba(255,255,255,0.3);
}
.rank-row.rank-1 .rank-num { color: #ffd32a; font-size: 28px; }
.rank-row.rank-2 .rank-num { color: #c0c0c0; font-size: 24px; }
.rank-row.rank-3 .rank-num { color: #c8622a; font-size: 24px; }

.rank-medal { font-size: 28px; min-width: 36px; text-align: center; }

.rank-name {
  flex: 1; font-size: 22px; font-weight: 900; color: #fff;
  letter-spacing: 1px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
}
.rank-row.rank-1 .rank-name { color: #ffd32a; font-size: 26px; }

.rank-score {
  font-size: 28px; font-weight: 900; color: #ffd32a;
  text-shadow: 0 0 12px rgba(255,211,42,0.5);
  min-width: 120px; text-align: right;
}
.rank-row.rank-1 .rank-score { font-size: 36px; }
.rank-score-label {
  font-size: 10px; color: rgba(255,211,42,0.4);
  letter-spacing: 2px; display: block; text-align: right; margin-top: 2px;
}

.rank-house { font-size: 20px; min-width: 28px; text-align: center; }

/* ── 空狀態 ── */
#empty-state {
  display: none; flex: 1; align-items: center; justify-content: center;
  flex-direction: column; gap: 16px;
}
#empty-state.show { display: flex; }
.empty-icon { font-size: 64px; opacity: 0.3; animation: bounce 2s ease-in-out infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-12px)} }
.empty-text { font-size: 18px; color: rgba(255,255,255,0.2); letter-spacing: 2px; }

/* ── 底部 ── */
#footer {
  flex-shrink: 0; text-align: center; margin-top: 20px;
  font-size: 11px; color: rgba(255,255,255,0.15); letter-spacing: 2px;
}

/* ── 清除按鈕 ── */
#clear-btn {
  margin-top: 10px;
  padding: 8px 18px;
  border-radius: 50px;
  border: 1.5px solid rgba(255,107,107,0.5);
  background: rgba(255,107,107,0.1);
  color: #ff6b6b;
  font-size: 12px;
  font-family: inherit;
  letter-spacing: 2px;
  cursor: pointer;
  transition: all 0.2s;
}
#clear-btn:hover {
  background: rgba(255,107,107,0.25);
  border-color: #ff6b6b;
  box-shadow: 0 0 12px rgba(255,107,107,0.3);
}

</style>
</head>
<body>
<div id="bg"></div>

<div id="app">
  <div id="header">
    <div class="header-left">
      <div class="header-logo">🏠</div>
      <div class="header-titles">
        <div class="header-title">點心屋派對</div>
        <div class="header-sub">CANDY HOUSE PARTY — LEADERBOARD</div>
      </div>
    </div>
    <div class="header-right">
      <div><span class="live-dot"></span><span class="live-label">LIVE</span></div>
      <div class="player-count" id="player-count">0</div>
      <div class="player-count-label">PLAYERS</div>
      <button id="clear-btn">🗑 清除所有資料</button>
    </div>
  </div>

  <div id="board-wrap">
    <div id="empty-state" class="show">
      <div class="empty-icon">🍬</div>
      <div class="empty-text">等待玩家加入...</div>
    </div>
  </div>

  <div id="footer">資料每 3 秒自動更新 · KUYA CANDY GAME</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, onValue } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl_NqANwk_lsfEL5kOyC1RJi29DLvGPU8",
  authDomain: "kuya-candy-game.firebaseapp.com",
  databaseURL: "https://kuya-candy-game-default-rtdb.firebaseio.com",
  projectId: "kuya-candy-game",
  storageBucket: "kuya-candy-game.firebasestorage.app",
  messagingSenderId: "105923267148",
  appId: "1:105923267148:web:1f0e0db9de8cc2876c42e9"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// 背景星星
const bgEl = document.getElementById('bg');
for(let i=0;i<60;i++){
  const s=document.createElement('div'); s.className='bg-star';
  const sz=Math.random()*2.5+0.5;
  s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*5}s;animation-delay:${Math.random()*5}s`;
  bgEl.appendChild(s);
}

const MEDALS = ['🥇','🥈','🥉'];
const HOUSES = [
  {min:0,     max:1999,    emoji:'🏚️'},
  {min:2000,  max:3999,    emoji:'🏠'},
  {min:4000,  max:5999,    emoji:'🍬'},
  {min:6000,  max:7999,    emoji:'🏰'},
  {min:8000,  max:9999,    emoji:'🌈'},
  {min:10000, max:Infinity, emoji:'👑'},
];
function getHouseEmoji(s){ return (HOUSES.find(h=>s>=h.min&&s<=h.max)||HOUSES[HOUSES.length-1]).emoji; }

const boardWrap   = document.getElementById('board-wrap');
const emptyState  = document.getElementById('empty-state');
const playerCount = document.getElementById('player-count');

let prevScores = {}; // 追蹤前一次的分數，用來偵測更新

function render(scores){
  const sorted = Object.values(scores).sort((a,b)=>b.score-a.score);
  playerCount.textContent = sorted.length;

  if(sorted.length===0){
    emptyState.classList.add('show');
    boardWrap.querySelectorAll('.rank-row').forEach(el=>el.remove());
    return;
  }
  emptyState.classList.remove('show');

  const display = sorted;

  boardWrap.querySelectorAll('.rank-row').forEach(el=>el.remove());

  display.forEach((p,i)=>{
    const row = document.createElement('div');
    const rankClass = i<3 ? `rank-${i+1}` : '';
    const wasUpdated = prevScores[p.name] !== undefined && prevScores[p.name] !== p.score;
    row.className = `rank-row ${rankClass}`;
    row.style.animationDelay = (i*0.05)+'s';
    row.innerHTML = `
      <div class="rank-num">${i+1}</div>
      <div class="rank-medal">${i<3 ? MEDALS[i] : ''}</div>
      <div class="rank-name">${p.name}</div>
      <div class="rank-house">${getHouseEmoji(p.score)}</div>
      <div>
        <div class="rank-score">${p.score.toLocaleString()}</div>
        <span class="rank-score-label">PTS</span>
      </div>
    `;
    if(wasUpdated) setTimeout(()=>row.classList.add('updated'), 100);
    boardWrap.appendChild(row);
  });

  // 更新舊分數紀錄
  prevScores = {};
  sorted.forEach(p=>{ prevScores[p.name]=p.score; });
}

// 即時監聽 Firebase
const scoresRef = ref(db, 'scores');
onValue(scoresRef, (snap)=>{
  if(snap.exists()) render(snap.val());
  else render({});
});

// 清除所有資料
import { remove } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";
document.getElementById('clear-btn').addEventListener('click', async ()=>{
  if(!confirm('確定要清除所有玩家分數嗎？\n此動作無法復原。')) return;
  if(!confirm('再次確認：清除後排行榜將歸零，繼續嗎？')) return;
  await remove(ref(db, 'scores'));
  alert('✅ 已清除所有資料！');
});

</script>
</body>
</html>
