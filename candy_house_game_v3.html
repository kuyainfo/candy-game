<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>點心屋派對</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
  height: 100%; overflow: hidden;
  background: #1a0a2e;
  font-family: 'Arial Rounded MT Bold', 'Arial Black', Arial, sans-serif;
  touch-action: none;
  user-select: none;
  -webkit-user-select: none;
}
#bg {
  position: fixed; inset: 0; z-index: 0;
  background: linear-gradient(160deg, #2d1454 0%, #1a0a2e 50%, #0d1f3a 100%);
  overflow: hidden;
}
.bg-star {
  position: absolute; border-radius: 50%; background: #fff;
  animation: twinkle linear infinite;
}
@keyframes twinkle { 0%,100%{opacity:0.05} 50%{opacity:0.5} }
.bg-candy {
  position: absolute; font-size: 28px; opacity: 0.06;
  animation: floatCandy linear infinite;
}
@keyframes floatCandy {
  from { transform: translateY(100vh) rotate(0deg); }
  to   { transform: translateY(-120px) rotate(360deg); }
}
#wrap {
  width: 100vw; max-width: 420px; height: 100vh;
  margin: 0 auto; position: relative; z-index: 1;
  display: flex; flex-direction: column; align-items: center;
}
#name-screen {
  position: absolute; inset: 0; z-index: 100;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  padding: 32px 24px;
  background: linear-gradient(160deg, #2d1454cc, #1a0a2ecc);
  backdrop-filter: blur(12px);
}
.ns-logo { font-size: 56px; margin-bottom: 8px; animation: bounce 1.2s ease-in-out infinite alternate; }
@keyframes bounce { from{transform:translateY(0)} to{transform:translateY(-10px)} }
.ns-title {
  font-size: 28px; font-weight: 900; color: #fff;
  text-shadow: 0 0 20px #ff85c8, 0 0 40px #ff85c8;
  letter-spacing: 2px; margin-bottom: 4px;
}
.ns-sub { font-size: 13px; color: #c9a8f0; margin-bottom: 36px; letter-spacing: 1px; }
.ns-label { font-size: 13px; color: #e0c8ff; margin-bottom: 10px; letter-spacing: 1px; }
#name-input {
  width: 100%; max-width: 280px; padding: 14px 20px;
  border-radius: 50px; border: 2px solid #ff85c8;
  background: rgba(255,255,255,0.08); color: #fff;
  font-size: 18px; font-family: inherit; text-align: center;
  outline: none; margin-bottom: 20px;
  box-shadow: 0 0 20px rgba(255,133,200,0.3);
}
#name-input::placeholder { color: rgba(255,255,255,0.3); }
#start-btn {
  width: 100%; max-width: 280px; padding: 16px;
  border-radius: 50px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #ff6eb4, #ff85c8, #ffd32a);
  color: #fff; font-size: 20px; font-weight: 900;
  font-family: inherit; letter-spacing: 2px;
  box-shadow: 0 4px 20px rgba(255,110,180,0.5);
  transition: transform 0.1s;
}
#start-btn:active { transform: scale(0.96); }
.ns-deco {
  display: flex; gap: 12px; margin-top: 32px; font-size: 28px;
  animation: wiggle 2s ease-in-out infinite;
}
@keyframes wiggle { 0%,100%{transform:rotate(-3deg)} 50%{transform:rotate(3deg)} }
#hud {
  width: 100%; display: flex; justify-content: space-between; align-items: center;
  padding: 12px 16px 8px;
  background: rgba(20,8,40,0.85); backdrop-filter: blur(10px);
  border-bottom: 1px solid rgba(255,133,200,0.2);
  flex-shrink: 0;
}
.hud-block { text-align: center; min-width: 72px; }
.hud-label { font-size: 9px; color: rgba(255,200,240,0.5); letter-spacing: 2px; margin-bottom: 2px; }
.hud-val { font-size: 22px; color: #fff; font-weight: 900; line-height: 1; }
#score-val { color: #ffd32a; }
#combo-val { color: #ff85c8; }
#timer-val { color: #a29bfe; }
#timer-bar-wrap { width: 100%; height: 5px; background: rgba(255,255,255,0.05); flex-shrink: 0; }
#timer-bar {
  height: 100%; width: 100%;
  background: linear-gradient(90deg, #a29bfe, #ff85c8, #ffd32a);
  transition: width 0.1s linear;
}
#board-wrap {
  flex: 1; display: flex; align-items: center; justify-content: center;
  padding: 8px 10px; position: relative; width: 100%;
}
#board {
  display: grid; grid-template-columns: repeat(6, 1fr);
  gap: 5px; width: 100%; max-width: 380px;
}
.cell {
  aspect-ratio: 1; border-radius: 12px;
  display: flex; align-items: center; justify-content: center;
  font-size: clamp(24px, 6.5vw, 38px);
  background: rgba(255,255,255,0.06);
  border: 1.5px solid rgba(255,255,255,0.08);
  position: relative; transition: transform 0.08s, filter 0.08s; cursor: pointer;
}
.cell.selected {
  transform: scale(0.88);
  filter: brightness(1.6) drop-shadow(0 0 8px currentColor);
  border-color: rgba(255,255,255,0.5);
  background: rgba(255,255,255,0.18); z-index: 2;
}
.cell.matched { animation: popOut 0.25s ease forwards; }
@keyframes popOut {
  0%{transform:scale(1);opacity:1} 50%{transform:scale(1.35);opacity:0.8} 100%{transform:scale(0);opacity:0}
}
.cell.falling { animation: fallIn 0.22s cubic-bezier(.2,.8,.4,1.2) forwards; }
@keyframes fallIn {
  from{transform:translateY(-40px) scale(0.7);opacity:0}
  to{transform:translateY(0) scale(1);opacity:1}
}
#line-canvas { position: absolute; inset: 0; pointer-events: none; z-index: 10; }
.score-popup {
  position: absolute; z-index: 20; pointer-events: none;
  color: #ffd32a; font-size: 22px; font-weight: 900;
  text-shadow: 0 0 10px rgba(255,211,42,0.8);
  animation: floatUp 0.8s ease forwards;
}
@keyframes floatUp {
  from{opacity:1;transform:translateY(0) scale(1)}
  to{opacity:0;transform:translateY(-60px) scale(1.3)}
}
#combo-msg {
  position: absolute; top: 30%; left: 50%; transform: translateX(-50%);
  font-size: 26px; font-weight: 900; color: #ff85c8;
  text-shadow: 0 0 20px #ff85c8, 0 0 40px #ff85c8;
  pointer-events: none; z-index: 30; opacity: 0; white-space: nowrap;
}
#combo-msg.show { opacity: 1; animation: comboPop 0.6s ease forwards; }
@keyframes comboPop {
  0%{transform:translateX(-50%) scale(0.8)} 40%{transform:translateX(-50%) scale(1.2)} 100%{transform:translateX(-50%) scale(1);opacity:0}
}
/* 結束畫面 */
#end-screen {
  position: absolute; inset: 0; z-index: 100;
  display: none; flex-direction: column;
  align-items: center; justify-content: space-between;
  padding: 28px 24px 32px;
  background: linear-gradient(160deg, #2d1454ee, #1a0a2eee);
  backdrop-filter: blur(16px); overflow-y: auto;
}
.end-header { text-align: center; }
.end-title { font-size: 22px; font-weight: 900; color: #fff; letter-spacing: 2px; margin-bottom: 2px; }
.end-player { font-size: 13px; color: #c9a8f0; }
.end-house-wrap {
  flex: 1; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 10px; padding: 10px 0;
}
.house-svg-wrap {
  width: 180px; height: 160px;
  filter: drop-shadow(0 0 20px var(--house-glow, #ff85c8));
  animation: houseFloat 2.4s ease-in-out infinite alternate;
}
@keyframes houseFloat { from{transform:translateY(0)} to{transform:translateY(-8px)} }
.house-rank-label { font-size: 13px; color: rgba(255,255,255,0.5); letter-spacing: 2px; }
.house-rank-name {
  font-size: 22px; font-weight: 900; color: #fff;
  text-shadow: 0 0 16px var(--house-glow, #ff85c8); letter-spacing: 1px;
}
.end-scores { width: 100%; display: flex; gap: 10px; margin-bottom: 4px; }
.end-score-box {
  flex: 1; background: rgba(255,211,42,0.08);
  border: 1.5px solid rgba(255,211,42,0.3);
  border-radius: 16px; padding: 14px 10px; text-align: center;
}
.end-score-box.best { background: rgba(162,155,254,0.08); border-color: rgba(162,155,254,0.3); }
.end-score-label { font-size: 9px; color: rgba(255,200,200,0.5); letter-spacing: 2px; margin-bottom: 4px; }
.end-score-val { font-size: 36px; font-weight: 900; color: #ffd32a; line-height: 1; }
.end-score-box.best .end-score-val { color: #a29bfe; font-size: 28px; }
.end-new-best {
  font-size: 13px; color: #ffd32a; font-weight: 900; letter-spacing: 1px;
  animation: pulse 0.8s ease infinite alternate; display: none; text-align: center; margin-bottom: 2px;
}
@keyframes pulse { from{opacity:0.4} to{opacity:1} }
/* 上傳狀態 */
#upload-status {
  font-size: 12px; color: rgba(255,255,255,0.5); text-align: center;
  margin-bottom: 8px; min-height: 18px; letter-spacing: 1px;
}
#upload-status.ok { color: #0be881; }
#upload-status.err { color: #ff6b6b; }
.end-btn-area { width: 100%; display: flex; flex-direction: column; align-items: center; gap: 10px; }
#retry-btn {
  width: 100%; max-width: 280px; padding: 15px;
  border-radius: 50px; border: none; cursor: pointer;
  background: linear-gradient(135deg, #ff6eb4, #ffd32a);
  color: #fff; font-size: 18px; font-weight: 900;
  font-family: inherit; letter-spacing: 2px;
  box-shadow: 0 4px 20px rgba(255,110,180,0.4); transition: transform 0.1s;
}
#retry-btn:active { transform: scale(0.96); }
</style>
</head>
<body>
<div id="bg"></div>
<div id="wrap">
  <div id="name-screen">
    <div class="ns-logo">🏠</div>
    <div class="ns-title">點心屋派對</div>
    <div class="ns-sub">CANDY HOUSE PARTY</div>
    <div class="ns-label">輸入你的名字開始遊戲</div>
    <input id="name-input" type="text" placeholder="你的名字" maxlength="8" autocomplete="off">
    <button id="start-btn">▶ 開始派對！</button>
    <div class="ns-deco">🍬 🍪 🎂 🍭 🍩</div>
  </div>
  <div id="hud">
    <div class="hud-block">
      <div class="hud-label">SCORE</div>
      <div class="hud-val" id="score-val">0</div>
    </div>
    <div class="hud-block" style="text-align:center">
      <div class="hud-val" style="font-size:12px;color:#e0c8ff" id="player-name-hud">—</div>
      <div class="hud-label" style="margin-top:2px">COMBO</div>
      <div class="hud-val" id="combo-val">0</div>
    </div>
    <div class="hud-block">
      <div class="hud-label">TIME</div>
      <div class="hud-val" id="timer-val">60</div>
    </div>
  </div>
  <div id="timer-bar-wrap"><div id="timer-bar"></div></div>
  <div id="board-wrap">
    <div id="board"></div>
    <canvas id="line-canvas"></canvas>
    <div id="combo-msg"></div>
  </div>
  <div id="end-screen">
    <div class="end-header">
      <div class="end-title">🎉 時間到！</div>
      <div class="end-player" id="end-player-name"></div>
    </div>
    <div class="end-house-wrap">
      <div class="house-svg-wrap" id="house-svg-wrap"></div>
      <div class="house-rank-label">YOUR CANDY HOUSE</div>
      <div class="house-rank-name" id="house-rank-name"></div>
    </div>
    <div class="end-scores">
      <div class="end-score-box">
        <div class="end-score-label">THIS ROUND</div>
        <div class="end-score-val" id="end-score">0</div>
      </div>
      <div class="end-score-box best">
        <div class="end-score-label">BEST</div>
        <div class="end-score-val" id="end-best">0</div>
      </div>
    </div>
    <div class="end-new-best" id="new-best-msg">⭐ 新紀錄！</div>
    <div id="upload-status"></div>
    <div class="end-btn-area">
      <button id="retry-btn">↺ 再玩一次</button>
    </div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getDatabase, ref, set, get } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-database.js";

const firebaseConfig = {
  apiKey: "AIzaSyDl_NqANwk_lsfEL5kOyC1RJi29DLvGPU8",
  authDomain: "kuya-candy-game.firebaseapp.com",
  databaseURL: "https://kuya-candy-game-default-rtdb.firebaseio.com",
  projectId: "kuya-candy-game",
  storageBucket: "kuya-candy-game.firebasestorage.app",
  messagingSenderId: "105923267148",
  appId: "1:105923267148:web:1f0e0db9de8cc2876c42e9"
};
const app = initializeApp(firebaseConfig);
const db  = getDatabase(app);

// ── 上傳最高分 ──
window.uploadScore = async function(name, score) {
  const statusEl = document.getElementById('upload-status');
  statusEl.textContent = '上傳中…'; statusEl.className = '';
  try {
    const key = name.replace(/[.#$[\]]/g,'_');
    const r = ref(db, 'scores/' + key);
    const snap = await get(r);
    const prev = snap.exists() ? (snap.val().score || 0) : 0;
    if (score >= prev) {
      await set(r, { name, score, updatedAt: Date.now() });
      statusEl.textContent = '✓ 分數已上傳'; statusEl.className = 'ok';
    } else {
      statusEl.textContent = '本局未破紀錄，保留最高分 ' + prev; statusEl.className = '';
    }
  } catch(e) {
    statusEl.textContent = '上傳失敗，請檢查網路'; statusEl.className = 'err';
  }
};

    { min:6000, max:7999, name:'奶油城堡', glow:'#a29bfe', svg:`<svg viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg"><rect x="20" y="80" width="140" height="75" rx="4" fill="#7a5ca0"/><rect x="28" y="88" width="124" height="67" rx="4" fill="#b8a0d8"/><rect x="60" y="55" width="60" height="100" rx="4" fill="#9370c8"/><rect x="65" y="60" width="50" height="95" rx="3" fill="#c8b0e8"/><rect x="20" y="70" width="36" height="85" rx="3" fill="#7a5ca0"/><rect x="24" y="75" width="28" height="80" rx="2" fill="#a888c8"/><rect x="124" y="70" width="36" height="85" rx="3" fill="#7a5ca0"/><rect x="128" y="75" width="28" height="80" rx="2" fill="#a888c8"/><polygon points="60,55 90,20 120,55" fill="#5a3a80"/><polygon points="63,55 90,24 117,55" fill="#9370c8"/><polygon points="20,70 38,45 56,70" fill="#5a3a80"/><polygon points="23,70 38,48 53,70" fill="#7a5ca0"/><polygon points="124,70 142,45 160,70" fill="#5a3a80"/><polygon points="127,70 142,48 157,70" fill="#7a5ca0"/><line x1="90" y1="20" x2="90" y2="5" stroke="#ffd32a" stroke-width="2"/><polygon points="90,5 105,11 90,17" fill="#ff85c8"/><path d="M72,155 L72,118 Q90,104 108,118 L108,155Z" fill="#5a3a80"/><rect x="75" y="70" width="30" height="24" rx="3" fill="#ffd32a" opacity="0.5"/><path d="M60,55 Q75,48 90,52 Q105,48 120,55" fill="none" stroke="#fff" stroke-width="3" opacity="0.7"/></svg>` },
    { min:8000, max:9999, name:'彩虹糖果宮殿', glow:'#0be881', svg:`<svg viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg"><path d="M10,155 Q90,40 170,155" fill="none" stroke="#ff6eb4" stroke-width="6" opacity="0.3"/><path d="M18,155 Q90,52 162,155" fill="none" stroke="#ffd32a" stroke-width="5" opacity="0.3"/><rect x="28" y="82" width="124" height="73" rx="6" fill="#3a0070"/><rect x="35" y="90" width="110" height="65" rx="5" fill="#7a20d0"/><rect x="55" y="48" width="70" height="107" rx="5" fill="#5a10b0"/><rect x="61" y="54" width="58" height="101" rx="4" fill="#9040e0"/><rect x="16" y="65" width="40" height="90" rx="4" fill="#3a0070"/><rect x="21" y="70" width="30" height="85" rx="3" fill="#6a20c0"/><rect x="124" y="65" width="40" height="90" rx="4" fill="#3a0070"/><rect x="129" y="70" width="30" height="85" rx="3" fill="#6a20c0"/><polygon points="55,48 90,8 125,48" fill="#2a0050"/><polygon points="59,48 90,14 121,48" fill="#8000ff"/><polygon points="16,65 36,36 56,65" fill="#2a0050"/><polygon points="19,65 36,39 53,65" fill="#5a10b0"/><polygon points="124,65 144,36 164,65" fill="#2a0050"/><polygon points="127,65 144,39 161,65" fill="#5a10b0"/><path d="M35,90 Q52,80 70,88 Q82,76 90,82 Q98,76 110,88 Q128,80 145,90" fill="none" stroke="#fff" stroke-width="4" stroke-linecap="round" opacity="0.8"/><path d="M70,155 L70,118 Q90,102 110,118 L110,155Z" fill="#2a0050"/><text x="85" y="6" text-anchor="middle" font-size="10">🌈</text></svg>` },
    { min:10000, max:Infinity, name:'夢幻糖果王國', glow:'#ffd32a', svg:`<svg viewBox="0 0 180 160" xmlns="http://www.w3.org/2000/svg"><rect x="30" y="78" width="120" height="77" rx="6" fill="#c8000a"/><rect x="37" y="85" width="106" height="70" rx="5" fill="#ff4040"/><rect x="55" y="40" width="70" height="115" rx="6" fill="#a00008"/><rect x="61" y="46" width="58" height="109" rx="5" fill="#ff2020"/><rect x="18" y="58" width="44" height="97" rx="4" fill="#c8000a"/><rect x="23" y="63" width="34" height="92" rx="3" fill="#ff4040"/><rect x="118" y="58" width="44" height="97" rx="4" fill="#c8000a"/><rect x="123" y="63" width="34" height="92" rx="3" fill="#ff4040"/><polygon points="55,40 90,2 125,40" fill="#7a0005"/><polygon points="59,40 90,7 121,40" fill="#e00010"/><polygon points="18,58 40,28 62,58" fill="#7a0005"/><polygon points="21,58 40,31 59,58" fill="#a00008"/><polygon points="118,58 140,28 162,58" fill="#7a0005"/><polygon points="121,58 140,31 159,58" fill="#a00008"/><line x1="90" y1="2" x2="90" y2="-8" stroke="#ffd32a" stroke-width="2.5"/><polygon points="90,-8 108,-1 90,6" fill="#ffd32a"/><path d="M37,85 Q52,72 68,83 Q78,68 90,76 Q102,68 112,83 Q128,72 143,85" fill="none" stroke="#fff" stroke-width="5" stroke-linecap="round"/><path d="M70,155 L70,115 Q90,98 110,115 L110,155Z" fill="#7a0005"/><text x="90" y="0" text-anchor="middle" font-size="13">👑</text><text x="20" y="62" font-size="10">⭐</text><text x="150" y="62" font-size="10">⭐</text></svg>` }
  ];
  function getHouse(s){ return HOUSES.find(h=>s>=h.min&&s<=h.max)||HOUSES[HOUSES.length-1]; }

  let board=[],cells=[],score=0,combo=0,bestScore=0;
  let timeLeft=TOTAL_TIME,running=false,playerName='';
  let dragging=false,selectedPath=[],countTimer=null,comboTO=null;
  let canvas,ctx;

  const nameScreen=document.getElementById('name-screen');
  const nameInput=document.getElementById('name-input');
  const startBtn=document.getElementById('start-btn');
  const endScreen=document.getElementById('end-screen');
  const retryBtn=document.getElementById('retry-btn');
  const boardEl=document.getElementById('board');
  const boardWrap=document.getElementById('board-wrap');
  const scoreEl=document.getElementById('score-val');
  const comboEl=document.getElementById('combo-val');
  const timerEl=document.getElementById('timer-val');
  const timerBar=document.getElementById('timer-bar');
  const playerNameHud=document.getElementById('player-name-hud');
  const endScoreEl=document.getElementById('end-score');
  const endBestEl=document.getElementById('end-best');
  const newBestMsg=document.getElementById('new-best-msg');
  const comboMsg=document.getElementById('combo-msg');
  const houseSvgWrap=document.getElementById('house-svg-wrap');
  const houseRankName=document.getElementById('house-rank-name');
  const endPlayerName=document.getElementById('end-player-name');
  canvas=document.getElementById('line-canvas');
  ctx=canvas.getContext('2d');

  const bgEl=document.getElementById('bg');
  for(let i=0;i<40;i++){
    const s=document.createElement('div');s.className='bg-star';
    const sz=Math.random()*2+1;
    s.style.cssText=`width:${sz}px;height:${sz}px;left:${Math.random()*100}%;top:${Math.random()*100}%;animation-duration:${2+Math.random()*4}s;animation-delay:${Math.random()*4}s`;
    bgEl.appendChild(s);
  }
  ['🍬','🍪','🍭','🍩','🍫'].forEach((c,i)=>{
    const el=document.createElement('div');el.className='bg-candy';el.textContent=c;
    el.style.cssText=`left:${(i+0.5)*20}%;animation-duration:${9+i*2}s;animation-delay:${i*1.5}s`;
    bgEl.appendChild(el);
  });

  function randItem(){ return ITEMS[Math.floor(Math.random()*ITEMS.length)]; }
  function initBoard(){
    board=[];
    for(let r=0;r<ROWS;r++){board[r]=[];for(let c=0;c<COLS;c++)board[r][c]=randItem();}
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){let t=0;while(t<20&&hasInitialMatch(r,c)){board[r][c]=randItem();t++;}}
  }
  function hasInitialMatch(r,c){
    const v=board[r][c];
    if(c>=2&&board[r][c-1]===v&&board[r][c-2]===v)return true;
    if(r>=2&&board[r-1][c]===v&&board[r-2][c]===v)return true;
    return false;
  }
  function renderBoard(){
    boardEl.innerHTML='';cells=[];
    for(let r=0;r<ROWS;r++){cells[r]=[];for(let c=0;c<COLS;c++){
      const el=document.createElement('div');el.className='cell';el.textContent=board[r][c];
      el.dataset.r=r;el.dataset.c=c;boardEl.appendChild(el);cells[r][c]=el;
    }}
    resizeCanvas();
  }
  function renderBoardWithAnim(){
    boardEl.innerHTML='';cells=[];
    for(let r=0;r<ROWS;r++){cells[r]=[];for(let c=0;c<COLS;c++){
      const el=document.createElement('div');el.className='cell falling';el.textContent=board[r][c];
      el.dataset.r=r;el.dataset.c=c;boardEl.appendChild(el);cells[r][c]=el;
    }}
    resizeCanvas();
  }
  function resizeCanvas(){
    const rect=boardEl.getBoundingClientRect();const wRect=boardWrap.getBoundingClientRect();
    canvas.width=rect.width;canvas.height=rect.height;
    canvas.style.left=(rect.left-wRect.left)+'px';canvas.style.top=(rect.top-wRect.top)+'px';
  }
  function cellCenter(r,c){
    const el=cells[r][c];const br=el.getBoundingClientRect();const cr=canvas.getBoundingClientRect();
    return{x:br.left+br.width/2-cr.left,y:br.top+br.height/2-cr.top};
  }
  function drawLines(){
    ctx.clearRect(0,0,canvas.width,canvas.height);if(selectedPath.length<2)return;
    const item=board[selectedPath[0].r][selectedPath[0].c];
    const colors={'🍬':'#ff85c8','🍪':'#ffd32a','🎂':'#a29bfe','🍭':'#0be881','🍩':'#ff6b6b','🍫':'#c8622a'};
    const col=colors[item]||'#fff';
    ctx.strokeStyle=col;ctx.lineWidth=7;ctx.lineCap='round';ctx.lineJoin='round';
    ctx.shadowColor=col;ctx.shadowBlur=14;ctx.globalAlpha=0.75;
    ctx.beginPath();const f=cellCenter(selectedPath[0].r,selectedPath[0].c);ctx.moveTo(f.x,f.y);
    for(let i=1;i<selectedPath.length;i++){const p=cellCenter(selectedPath[i].r,selectedPath[i].c);ctx.lineTo(p.x,p.y);}
    ctx.stroke();ctx.globalAlpha=1;ctx.shadowBlur=0;
  }
  function getCellFromPoint(x,y){
    for(let r=0;r<ROWS;r++)for(let c=0;c<COLS;c++){
      const rect=cells[r][c].getBoundingClientRect();
      if(x>=rect.left&&x<=rect.right&&y>=rect.top&&y<=rect.bottom)return{r,c};
    }
    return null;
  }
  function isAdjacent(a,b){return Math.abs(a.r-b.r)<=1&&Math.abs(a.c-b.c)<=1&&!(a.r===b.r&&a.c===b.c);}
  function inPath(r,c){return selectedPath.some(p=>p.r===r&&p.c===c);}
  function getPoint(e){
    if(e.touches&&e.touches.length>0)return{x:e.touches[0].clientX,y:e.touches[0].clientY};
    return{x:e.clientX,y:e.clientY};
  }
  function onDragStart(e){
    if(!running)return;if(e.cancelable)e.preventDefault();
    const{x,y}=getPoint(e);const cell=getCellFromPoint(x,y);if(!cell)return;
    dragging=true;selectedPath=[cell];cells[cell.r][cell.c].classList.add('selected');drawLines();
  }
  function onDragMove(e){
    if(!running||!dragging)return;if(e.cancelable)e.preventDefault();
    const{x,y}=getPoint(e);const cell=getCellFromPoint(x,y);if(!cell)return;
    const last=selectedPath[selectedPath.length-1];
    const item=board[selectedPath[0].r][selectedPath[0].c];
    if(selectedPath.length>=2){
      const prev=selectedPath[selectedPath.length-2];
      if(prev.r===cell.r&&prev.c===cell.c){cells[last.r][last.c].classList.remove('selected');selectedPath.pop();drawLines();return;}
    }
    if(inPath(cell.r,cell.c))return;
    if(board[cell.r][cell.c]!==item)return;
    if(!isAdjacent(last,cell))return;
    selectedPath.push(cell);cells[cell.r][cell.c].classList.add('selected');drawLines();
  }
  function onDragEnd(e){
    if(!running||!dragging)return;if(e.cancelable)e.preventDefault();
    dragging=false;ctx.clearRect(0,0,canvas.width,canvas.height);
    if(selectedPath.length>=3)triggerMatch();
    else{selectedPath.forEach(p=>cells[p.r][p.c].classList.remove('selected'));selectedPath=[];}
  }
  function triggerMatch(){
    const len=selectedPath.length;const pts=calcScore(len);
    score+=pts;combo++;scoreEl.textContent=score;comboEl.textContent=combo;
    showScorePopup(pts,selectedPath[Math.floor(len/2)]);
    if(combo>=3)showComboMsg(combo);
    selectedPath.forEach(p=>{cells[p.r][p.c].classList.remove('selected');cells[p.r][p.c].classList.add('matched');});
    setTimeout(applyGravity,250);
  }
  function calcScore(len){
    const base=[0,0,0,30,60,100,150,220];
    const pts=len<base.length?base[len]:base[base.length-1]+(len-7)*40;
    return pts*Math.max(1,Math.floor(combo/3)+1);
  }
  function applyGravity(){
    selectedPath.forEach(p=>{board[p.r][p.c]=null;});selectedPath=[];
    for(let c=0;c<COLS;c++){
      let empty=[];
      for(let r=ROWS-1;r>=0;r--){
        if(board[r][c]===null)empty.push(r);
        else if(empty.length>0){const t=empty.shift();board[t][c]=board[r][c];board[r][c]=null;empty.push(r);}
      }
      for(let r=0;r<ROWS;r++)if(board[r][c]===null)board[r][c]=randItem();
    }
    renderBoardWithAnim();
  }
  function showScorePopup(pts,pos){
    const el=cells[pos.r][pos.c];const rect=el.getBoundingClientRect();const wRect=boardWrap.getBoundingClientRect();
    const pop=document.createElement('div');pop.className='score-popup';pop.textContent='+'+pts;
    pop.style.left=(rect.left-wRect.left+rect.width/2-20)+'px';pop.style.top=(rect.top-wRect.top)+'px';
    boardWrap.appendChild(pop);setTimeout(()=>pop.remove(),800);
  }
  function showComboMsg(c){
    if(comboTO)clearTimeout(comboTO);
    comboMsg.textContent=c+'x COMBO! 🎉';
    comboMsg.classList.remove('show');void comboMsg.offsetWidth;comboMsg.classList.add('show');
    comboTO=setTimeout(()=>comboMsg.classList.remove('show'),600);
  }
  function startTimer(){
    timeLeft=TOTAL_TIME;timerEl.textContent=TOTAL_TIME;timerBar.style.width='100%';
    countTimer=setInterval(()=>{
      timeLeft-=0.1;
      timerBar.style.width=(Math.max(0,timeLeft/TOTAL_TIME)*100)+'%';
      timerEl.textContent=Math.ceil(timeLeft);
      if(timeLeft<=0){clearInterval(countTimer);endGame();}
    },100);
  }
  function startGame(){
    score=0;combo=0;scoreEl.textContent='0';comboEl.textContent='0';
    if(countTimer)clearInterval(countTimer);
    document.getElementById('upload-status').textContent='';
    initBoard();renderBoard();endScreen.style.display='none';running=true;
    startTimer();
    boardEl.addEventListener('touchstart',onDragStart,{passive:false});
    boardEl.addEventListener('touchmove',onDragMove,{passive:false});
    boardEl.addEventListener('touchend',onDragEnd,{passive:false});
    boardEl.addEventListener('mousedown',onDragStart);
    window.addEventListener('mousemove',onDragMove);
    window.addEventListener('mouseup',onDragEnd);
  }
  function endGame(){
    running=false;dragging=false;ctx.clearRect(0,0,canvas.width,canvas.height);
    boardEl.removeEventListener('touchstart',onDragStart);
    boardEl.removeEventListener('touchmove',onDragMove);
    boardEl.removeEventListener('touchend',onDragEnd);
    boardEl.removeEventListener('mousedown',onDragStart);
    window.removeEventListener('mousemove',onDragMove);
    window.removeEventListener('mouseup',onDragEnd);
    const isNew=score>bestScore;if(isNew)bestScore=score;
    endScoreEl.textContent=score;endBestEl.textContent=bestScore;
    newBestMsg.style.display=isNew?'block':'none';
    endPlayerName.textContent=playerName;
    const h=getHouse(score);
    houseSvgWrap.innerHTML=h.svg;
    houseSvgWrap.style.setProperty('--house-glow',h.glow);
    houseRankName.style.setProperty('--house-glow',h.glow);
    houseRankName.textContent=h.name;
    endScreen.style.display='flex';
    // 上傳到 Firebase
    window.uploadScore(playerName, bestScore);
  }
  function handleStart(){
    const name=nameInput.value.trim();if(!name){nameInput.focus();return;}
    playerName=name;playerNameHud.textContent=name;nameScreen.style.display='none';startGame();
  }
  startBtn.addEventListener('click',handleStart);
  startBtn.addEventListener('touchend',function(e){e.preventDefault();handleStart();},{passive:false});
  nameInput.addEventListener('keydown',function(e){if(e.key==='Enter')handleStart();});
  retryBtn.addEventListener('click',startGame);
  retryBtn.addEventListener('touchend',function(e){e.preventDefault();startGame();},{passive:false});
  window.addEventListener('resize',resizeCanvas);
})();
</script>
</body>
